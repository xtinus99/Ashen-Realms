<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ashen Realms</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-gradient"></div>
        <div class="bg-noise"></div>
        <div class="bg-vignette"></div>
        <div class="smoke-layer">
            <div class="smoke smoke-1"></div>
            <div class="smoke smoke-2"></div>
            <div class="smoke smoke-3"></div>
            <div class="smoke smoke-4"></div>
        </div>
        <div class="border-glow border-top"></div>
        <div class="border-glow border-bottom"></div>
        <div class="border-glow border-left"></div>
        <div class="border-glow border-right"></div>
        <div class="corner-decay corner-tl"></div>
        <div class="corner-decay corner-tr"></div>
        <div class="corner-decay corner-bl"></div>
        <div class="corner-decay corner-br"></div>
        <div class="ash-container">
            <div class="ash a1"></div>
            <div class="ash a2"></div>
            <div class="ash a3"></div>
            <div class="ash a4"></div>
            <div class="ash a5"></div>
            <div class="ash a6"></div>
            <div class="ash a7"></div>
            <div class="ash a8"></div>
            <div class="ash a9"></div>
            <div class="ash a10"></div>
            <div class="ash a11"></div>
            <div class="ash a12"></div>
            <div class="ash a13"></div>
            <div class="ash a14"></div>
            <div class="ash a15"></div>
        </div>
    </div>

    <div class="app">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-icon skull-icon" id="skull-icon">
                        <i data-lucide="skull" class="skull-lucide"></i>
                    </div>
                    <div class="logo-text">
                        <h1>The Ashen Realms</h1>
                        <span class="subtitle">Player Compendium</span>
                    </div>
                </div>
            </div>

            <div class="search-wrapper">
                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="search" placeholder="Search..." autocomplete="off">
                    <kbd class="search-hint">Ctrl+K</kbd>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-categories" id="nav-categories"></div>
            </div>

            <div class="sidebar-footer">
                <div class="footer-quote">
                    <em>"The Maker is dead. The Sovereigns reign."</em>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
                    <i data-lucide="menu"></i>
                </button>
                <div class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-home">Compendium</span>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="content-body" id="content-body"></div>
            </div>
        </main>
    </div>

    <div class="search-modal" id="search-modal">
        <div class="search-modal-backdrop"></div>
        <div class="search-modal-content">
            <div class="search-modal-input">
                <i data-lucide="search"></i>
                <input type="text" id="modal-search" placeholder="Search..." autocomplete="off">
                <kbd>Esc</kbd>
            </div>
            <div class="search-modal-results" id="modal-search-results"></div>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-content">
            <img src="" alt="" id="lightbox-img">
            <button class="lightbox-close" aria-label="Close">&times;</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
