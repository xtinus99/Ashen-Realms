<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ashen Realms - Player Compendium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1>The Ashen Realms</h1>
                <p class="tagline">Player Compendium</p>
            </div>

            <div class="search-container">
                <i data-lucide="search"></i>
                <input type="text" id="search" placeholder="Search...">
            </div>

            <div class="nav-categories" id="nav-categories">
                <!-- Generated by JS -->
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <div class="content-header">
                <button class="menu-toggle" id="menu-toggle">
                    <i data-lucide="menu"></i>
                </button>
                <h2 id="content-title">Welcome</h2>
            </div>

            <div class="content-body" id="content-body">
                <div class="welcome-screen">
                    <div class="welcome-icon">
                        <i data-lucide="book-open"></i>
                    </div>
                    <h2>Welcome to the Ashen Realms</h2>
                    <p>This is your compendium of campaign knowledge. Select a category from the sidebar to explore.</p>
                    <blockquote>
                        <em>"This is the era where the world begins to wake."</em>
                    </blockquote>
                    <div class="quick-stats" id="quick-stats">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
