<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ashen Realms</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-gradient"></div>
        <div class="bg-noise"></div>
        <div class="bg-vignette"></div>
        <div class="bg-smoke"></div>
        <div class="bg-bones"></div>
        <div class="bg-rot-bottom"></div>
        <div class="bg-particles"></div>
    </div>

    <div class="app">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="2" opacity="0.3"/>
                            <circle cx="50" cy="50" r="35" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
                            <circle cx="50" cy="50" r="8" fill="currentColor" opacity="0.8"/>
                            <path d="M50 5 L50 20 M50 80 L50 95 M5 50 L20 50 M80 50 L95 50" stroke="currentColor" stroke-width="2" opacity="0.4"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>The Ashen Realms</h1>
                        <span class="subtitle">Player Compendium</span>
                    </div>
                </div>
            </div>

            <div class="search-wrapper">
                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="search" placeholder="Search..." autocomplete="off">
                    <kbd class="search-hint">Ctrl+K</kbd>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-categories" id="nav-categories"></div>
            </div>

            <div class="sidebar-footer">
                <div class="footer-quote">
                    <em>"The Maker is dead. The Sovereigns reign."</em>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
                    <i data-lucide="menu"></i>
                </button>
                <div class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-home">Compendium</span>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="content-body" id="content-body"></div>
            </div>
        </main>
    </div>

    <div class="search-modal" id="search-modal">
        <div class="search-modal-backdrop"></div>
        <div class="search-modal-content">
            <div class="search-modal-input">
                <i data-lucide="search"></i>
                <input type="text" id="modal-search" placeholder="Search..." autocomplete="off">
                <kbd>Esc</kbd>
            </div>
            <div class="search-modal-results" id="modal-search-results"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
